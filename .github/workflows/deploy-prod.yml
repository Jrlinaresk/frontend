name: Deploy production frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, excalapp-prod]
    env:
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start production stack
        run: docker compose -f docker-compose.prod.yml --profile tunnel up -d --build --remove-orphans
